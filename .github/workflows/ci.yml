name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests

      - name: Build package
        run: python -m build

      - name: Check wheel package data
        shell: python
        run: |
          from pathlib import Path
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel generated.")

          required = {
              "repopilot/prompts/chat_prompt.md",
              "repopilot/prompts/intent_prompt.md",
              "repopilot/prompts/system_prompt.md",
          }
          with zipfile.ZipFile(wheels[-1]) as wheel:
              names = set(wheel.namelist())
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"Missing package data: {missing}")

      - name: Check patch whitespace
        run: git diff --check
