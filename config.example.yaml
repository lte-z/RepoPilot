permissions:
  allow_all_roots: false
  readable_roots:
    - .
  writable_roots:
    - ./outputs
  deny_patterns:
    - "**/.env"
    - "**/.env.*"
    - "**/.git/**"
    - "**/.venv/**"
    - "**/.pytest_cache"
    - "**/.pytest_cache/**"
    - "**/.ruff_cache"
    - "**/.ruff_cache/**"
    - "**/.mypy_cache"
    - "**/.mypy_cache/**"
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/*.egg-info"
    - "**/*.egg-info/**"

execution:
  allow_command_execution: false
  allowed_commands: []

limits:
  max_file_chars: 20000
  max_search_results: 50
  max_tree_entries: 300
  max_tool_rounds: 8
